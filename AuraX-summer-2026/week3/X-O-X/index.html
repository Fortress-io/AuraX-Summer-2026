<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <h1>Tic Tac Toe</h1>

    <!-- Player setup form -->
    <form id="player-form" class="player-form">
      <div class="player-input">
        <label for="player1">Player 1 (X)</label>
        <input type="text" id="player1" name="player1" placeholder="Player 1" maxlength="12" />
      </div>
      <div class="player-input">
        <label for="player2">Player 2 (O)</label>
        <input type="text" id="player2" name="player2" placeholder="Player 2" maxlength="12" />
      </div>
      <button type="submit" id="start-btn">Start Game</button>
    </form>

    <!-- Status / results display -->
    <div id="result-display" class="result-display"></div>

    <!-- Gameboard -->
    <div id="gameboard" class="gameboard"></div>

    <button id="restart-btn" class="restart-btn hidden">Restart</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
